    - key: multi_agents[].deepagent_memory
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
          - src/config/agentic_assembly/ast/deepagent.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
          - src/config/agentic_assembly/validators/deepagent_semantic_validator.py
      note: O backend Redis é parte obrigatória do contrato governado quando enabled=true.
    - key: multi_agents[].deepagent_memory.redis.url
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/config/agentic_assembly/validators/deepagent_semantic_validator.py
      note: URL Redis é obrigatória para deepagent persistente.
    - key: multi_agents[].middlewares.human_in_the_loop.async_approval
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
          - docs/README-AST-AGENTIC-DESIGNER.md
          - docs/README-HUMAN-IN-THE-LOOP.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/deepagent.py
      runtime:
        coverage: present
        refs:
          - src/config/agentic_assembly/validators/deepagent_semantic_validator.py
          - src/agentic_layer/supervisor/deep_agent_supervisor.py
          - src/agentic_layer/supervisor/hil_async_approval_contract.py
      note: Contrato governado de aprovação HIL assíncrona por canais para DeepAgent em background.
    - key: multi_agents[].agents[].tools
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/agent_builder.py
      note: Subagentes deepagent continuam obrigados a expor ao menos uma tool.

divergences:
  - id: ASSEMBLY-RUNTIME-CATALOG-PRECEDENCE-RESOLVIDA
    key: workflows_defaults.tools_library + workflows[].local_mcp_configuration
    status: aligned
    summary: Não há divergência aberta neste ponto; o assembly e o runtime já compõem o catálogo de workflow com a mesma precedência e o assembly injeta tools MCP locais no catálogo efetivo.
    refs:
      - src/config/agentic_assembly/tool_resolver.py
      - src/agentic_layer/workflow/config_resolver.py
      - src/agentic_layer/mcp/mcp_config_resolver.py
      - tests/unit/test_tool_catalog_resolver.py
