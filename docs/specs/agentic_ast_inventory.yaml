metadata:
  purpose: >-
    Inventario canônico do contrato agentic governado pelo assembly. O arquivo
    cumpre dois papéis: continuar validando a sincronia mínima das docs AST e,
    adicionalmente, congelar uma matriz verificável de chaves docs x AST x runtime.
  status_scale:
    aligned: docs, AST e runtime concordam sobre a chave.
    docs_missing: AST e runtime suportam a chave, mas a documentação canônica não a cobre.
    ast_missing: docs e runtime suportam a chave, mas a AST governada não a modela.
    runtime_missing: docs e AST cobrem a chave, mas o runtime não foi confirmado lendo o código.
    partial: a chave existe, mas a cobertura é incompleta ou genérica em uma das camadas.
    contradictory: a chave aparece, porém há contradição entre trechos documentais ou entre camadas.
  coverage_scale:
    present: a camada cobre explicitamente a chave.
    partial: a camada cobre de forma genérica, indireta ou incompleta.
    missing: a camada não cobre a chave.

files:
  ast_manual: docs/README-AST-AGENTIC-DESIGNER.md
  service_api: docs/README-SERVICE-API.md
  workflow: docs/README-AGENTE-WORKFLOW.md
  supervisor: docs/README-AGENTE-SUPERVISOR.md
  deepagent: docs/README-DEEPAGENTS-SUPERVISOR.md

ast_manual:
  required_sections:
    - "# Manual Técnico AST Agentic Designer"
    - "### 0.1 AST em linguagem simples"
    - "### 0.2 Diagrama 101"
    - "### 0.3 Regra de consistência YAML x AST"
    - "## 2. Endpoints `/config/assembly`"
    - "## 3. Estrutura AST Canônica"
    - "## 4. AST de Workflow"
    - "## 5. AST de Supervisor Clássico"
    - "## 6. AST de DeepAgent Supervisor"
    - "## 7. AST de Expressão Segura"
    - "## 9. Fluxo operacional recomendado"
    - "## 12. Sobre o `verify_agentic_ast_docs_sync.py`"
  required_tokens:
    - "/config/assembly/preflight"
    - "POST /config/assembly/draft"
    - "POST /config/assembly/objective-to-yaml"
    - "POST /config/assembly/validate"
    - "POST /config/assembly/confirm"
    - "GET /config/assembly/schema"
    - "GET /config/assembly/catalog"
    - "POST /config/assembly/recommend-tools"
    - "AgenticDocumentAST"
    - "WorkflowNodeAST"
    - "DeepAgentSupervisorAST"
    - "agent_supervisor"
    - "deepagent_supervisor"
    - "YAML base ou prompt"

service_api:
  required_tokens:
    - "config_assembly_router"
    - "/config/assembly/preflight"
    - "/config/assembly/draft"
    - "/config/assembly/objective-to-yaml"
    - "/config/assembly/validate"
    - "/config/assembly/confirm"
    - "/config/assembly/recommend-tools"
    - "FEATURE_AGENTIC_AST_ENABLED"

workflow:
  required_tokens:
    - "## 14. Mapeamento AST"
    - "POST /config/assembly/draft"
    - "POST /config/assembly/validate"
    - "POST /config/assembly/confirm"

supervisor:
  required_tokens:
    - "## 14. Mapeamento AST"
    - "alvo de supervisor clássico"
    - "SupervisorAST"

deepagent:
  required_tokens:
    - "## 14. Mapeamento AST"
    - "alvo de supervisor deepagent"
    - "DeepAgentSupervisorAST"

canonical_inventory:
  common:
    - key: tools_library
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTIC-CONTRATO-COMUM.md
          - docs/README-AGENTE-WORKFLOW.md
          - docs/README-AGENTE-SUPERVISOR.md
          - docs/README-DEEPAGENTS-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/document.py
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
          - src/agentic_layer/supervisor/config_resolver.py
      note: Catálogo raiz reutilizado pelos resolvers de workflow e supervisor.
    - key: global_tools_configuration
      status: partial
      docs:
        coverage: present
        refs:
          - docs/README-AGENTIC-CONTRATO-COMUM.md
      ast:
        coverage: partial
        refs:
          - src/config/agentic_assembly/ast/document.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
          - src/agentic_layer/supervisor/config_resolver.py
      note: A AST de documento preserva o campo, mas os fragmentos targetizados não o emitem diretamente.
    - key: memory.checkpointer
      status: partial
      docs:
        coverage: present
        refs:
          - docs/README-AGENTIC-CONTRATO-COMUM.md
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: partial
        refs:
          - src/config/agentic_assembly/ast/document.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
          - src/agentic_layer/supervisor/config_resolver.py
      note: A AST atual guarda memory como dicionário bruto no documento, sem modelagem tipada do checkpointer.

  workflow:
    - key: selected_workflow
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/document.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
      note: Chave raiz usada para seleção explícita do workflow ativo.
    - key: workflows_defaults
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/document.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
      note: Defaults de workflow entram na composição do contexto e da biblioteca de tools.
    - key: workflows[].nodes[*].mode
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/workflow.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/agent_workflow.py
          - src/agentic_layer/workflow/integrity_analyzer.py
      note: Os modos suportados pela AST precisam continuar coerentes com o registry do runtime.
    - key: workflows[].edges
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/workflow.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/edge_models.py
      note: O contrato edge-first está modelado e possui validador próprio no runtime.
    - key: workflows[].local_tools_configuration
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/workflow.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
      note: O runtime compõe esse bloco junto com workflows_defaults.local_tools_configuration.
    - key: workflows[].tools_library
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/workflow.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/workflow/config_resolver.py
          - src/config/agentic_assembly/compilers/document_compiler.py
      note: O catálogo por workflow agora é modelado na WorkflowAST e preservado no round-trip governado.
    - key: workflows[].local_mcp_configuration
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-WORKFLOW.md
          - docs/README-AGENTIC-CONTRATO-COMUM.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/workflow.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/mcp/mcp_config_resolver.py
      note: O workflow agora documenta o bloco local_mcp_configuration, sua composição com o escopo global e o uso de tools MCP locais no catálogo efetivo.

  supervisor:
    - key: selected_supervisor
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
          - docs/README-AST-AGENTIC-DESIGNER.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/document.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
      note: A documentação do supervisor agora trata selected_supervisor como chave raiz canônica de seleção explícita.
    - key: multi_agents[].execution.type
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
      note: O runtime normaliza agent, deepagent e workflow e rejeita aliases legados.
    - key: multi_agents[].prompt
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/prompt_helper.py
      note: Prompt explícito do supervisor tem precedência sobre directives.
    - key: multi_agents[].directives
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/prompt_helper.py
      note: Directives permanecem como fallback de prompt e agora são preservadas pela AST governada.
    - key: multi_agents[].tools_library
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
      note: O catálogo por supervisor é composto sobre o catálogo raiz.
    - key: multi_agents[].local_tools_configuration
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
      note: Overrides de tools no supervisor continuam parte do contrato canônico.
    - key: multi_agents[].agents[].tools
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-AGENTE-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/agent_builder.py
      note: Lista mínima de tools do agente especialista.

  deepagent:
    - key: selected_supervisor
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
          - docs/README-AST-AGENTIC-DESIGNER.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/document.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
      note: O alvo deepagent usa o mesmo campo raiz de seleção do supervisor governado.
    - key: multi_agents[].execution.type=deepagent
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/deepagent.py
          - src/config/agentic_assembly/ast/supervisor.py
      runtime:
        coverage: present
        refs:
          - src/agentic_layer/supervisor/config_resolver.py
      note: O subtipo DeepAgentSupervisorAST força o modo deepagent na validação.
    - key: multi_agents[].directives
      status: aligned
      docs:
        coverage: present
        refs:
          - docs/README-DEEPAGENTS-SUPERVISOR.md
      ast:
        coverage: present
        refs:
          - src/config/agentic_assembly/ast/supervisor.py
