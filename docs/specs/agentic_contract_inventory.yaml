    - "## 2. Bloco `tools_library`"
    - "## 3. Blocos de configuração de ferramentas"
    - "## 4. Bloco `memory`"
    - "## 5. Blocos reutilizáveis de execução"
    - "## 6. DSL de expressões seguras"
    - "## 7. Caminhos de dados (`reads` e `writes`)"
    - "## 8. Templates de prompt e valores"
  required_tokens:
