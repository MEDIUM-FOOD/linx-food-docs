    - "global_tools_configuration"
    - "local_tools_configuration"
    - "memory.checkpointer"
    - "memory.agent_conversation_history"
    - "memory.qa_short_history"
    - "memory.qa_long_memory"
    - "retry_policy"
    - "human_approval"
    - "failure_policy"
    - "SAFE_FUNCTIONS"
